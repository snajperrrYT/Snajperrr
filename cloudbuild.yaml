# Cloud Build config: builds image and deploys to Cloud Run
# Substitutions to provide when triggering the build:
# _SERVICE_NAME (e.g. snajperrr-service)
# _REGION (e.g. europe-west1)
# Optionally provide _GEMINI_KEY via Secret Manager integration

options:
  machineType: "E2_HIGHCPU_8"

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [ 'build', '-t', 'gcr.io/$PROJECT_ID/$_SERVICE_NAME', '.' ]

  - name: 'gcr.io/cloud-builders/docker'
    args: [ 'push', 'gcr.io/$PROJECT_ID/$_SERVICE_NAME' ]

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
# If you need to set env vars use --set-secrets or --set-env-vars. Prefer Secret Manager.

# increase timeout for large builds
timeout: '1200s'
