steps:
  - name: gcr.io/cloud-builders/docker
    id: Build
    args:
      - build
      - -t
      - '$_IMAGE_NAME:$COMMIT_SHA'
      - .

  - name: gcr.io/cloud-builders/docker
    id: Push
    args:
      - push
      - '$_IMAGE_NAME:$COMMIT_SHA'

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: Deploy
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services update $_SERVICE_NAME \
          --region=$_DEPLOY_REGION \
          --platform=managed \
          --remove-annotations=run.googleapis.com/sources \
          --quiet || true
        gcloud run deploy $_SERVICE_NAME \
          --image=$_IMAGE_NAME:$COMMIT_SHA \
          --region=$_DEPLOY_REGION \
          --platform=managed

substitutions:
  _SERVICE_NAME: discord-music-bot-dashboard
  _DEPLOY_REGION: us-west2
  _IMAGE_NAME: us-west2-docker.pkg.dev/gen-lang-client-0542481418/cloud-run-source-deploy/snajperrr/discord-music-bot-dashboard

images:
  - '$_IMAGE_NAME:$COMMIT_SHA'
