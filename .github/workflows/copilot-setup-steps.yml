name: CI Build

on:
  push:
    branches: ["main", "master", "fix/all-fixes"]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    name: Install, Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Run tests
        run: npm run test --if-present
